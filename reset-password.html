<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - CodeMiners</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Particles container for background -->
  <div id="particles-container"></div>

  <main class="scene">
    <header class="header">
      <div class="logo">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="40" height="40" rx="12" fill="url(#grad)" />
          <path d="M12 28L20 12L28 28M15 22H25" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="grad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
              <stop stop-color="#F39C12" />
              <stop offset="1" stop-color="#D35400" />
            </linearGradient>
          </defs>
        </svg>
        <span class="logo__text">CodeMiners</span>
      </div>
    </header>

    <section class="auth-section">
      <div class="glass-card" id="glassCard">
        <div class="card-header" id="cardHeader">
          <h2 class="card-title"><i class="fa-solid fa-key"></i> Reset Password</h2>
          <p class="card-subtitle">Set a new password for your account</p>
        </div>

        <form class="auth-form" id="resetForm" autocomplete="off">
          
          <div class="input-group">
            <label class="input-label" for="newPassword">New Password</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input class="input-field" type="password" id="newPassword" placeholder="" required minlength="6" />
            </div>
          </div>

          <div class="message-box" id="messageBox" role="alert"></div>

          <button class="btn-primary" type="submit" id="btnSubmit">
            <span class="btn-primary__text">Reset Password</span>
            <span class="btn-primary__loader" id="btnLoader"></span>
          </button>
          
          <div class="auth-toggle" style="margin-top: 2rem;">
            <a href="index.html" style="color: var(--tech-amber); font-weight: 500;">Back to Login</a>
          </div>

        </form>
      </div>
    </section>

    <footer class="footer">
      <p>&copy; 2026 CodeMiners Hackathon. All rights reserved.</p>
    </footer>
  </main>

  <script src="reset-password.js"></script>
  

<script>
  // Disable Ctrl, Shift shortcuts (F12, Ctrl+Shift+I/C/J, Ctrl+U) and Right Click to prevent inspection
  document.addEventListener('keydown', function(e) {
    if (e.key === 'F12' || e.keyCode === 123) {
      e.preventDefault();
      e.stopPropagation();
      return false;
    }
    if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'C' || e.key === 'c' || e.key === 'J' || e.key === 'j' || e.keyCode === 73 || e.keyCode === 67 || e.keyCode === 74)) {
      e.preventDefault();
      e.stopPropagation();
      return false;
    }
    if (e.ctrlKey && (e.key === 'U' || e.key === 'u' || e.keyCode === 85)) {
      e.preventDefault();
      e.stopPropagation();
      return false;
    }
  }, true);
  
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
  }, true);
</script>
</body>
</html>
