<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeMiners Hackathon — Login</title>
  <meta name="description" content="Sign in to CodeMiners Hackathon — Build, collaborate, and innovate with your team." />
  <meta name="theme-color" content="#343A40" />

  <!-- Google Fonts — Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <!-- Firebase SDK (compat for CDN usage) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <link rel="stylesheet" href="styles.css" />

  <!-- dotLottie Player Component -->
  <script type="module" src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs"></script>
</head>
<body>

  <!-- dotLottie Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay" style="display:none; position:fixed; inset:0; background:rgba(23, 27, 31, 0.85); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); z-index:10000; align-items:center; justify-content:center; flex-direction:column; gap:16px; opacity:0;">
    <dotlottie-player src="Champion.lottie" background="transparent" speed="1.2" style="width: 260px; height: 260px;" loop autoplay></dotlottie-player>
    <div style="font-family:'Outfit', sans-serif; font-size:18px; font-weight:700; color:var(--tech-amber); letter-spacing:0.05em; text-transform:uppercase; text-shadow:0 0 10px rgba(243,156,18,0.3);">Signing you in...</div>
  </div>

  <!-- ============================================ -->
  <!-- SVG Filters — Liquid Glass distortion        -->
  <!-- ============================================ -->
  <svg class="svg-filters" aria-hidden="true">
    <defs>
      <filter id="liquidGlass" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence
          id="turbulence"
          type="fractalNoise"
          baseFrequency="0.015"
          numOctaves="3"
          seed="2"
          result="noise"
        />
        <feDisplacementMap
          id="displacement"
          in="SourceGraphic"
          in2="noise"
          scale="8"
          xChannelSelector="R"
          yChannelSelector="G"
        />
      </filter>

      <!-- Lensing displacement/refraction filter -->
      <filter id="glassRefraction">
        <feTurbulence id="turbulence" type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="1" result="noise" />
        <feDisplacementMap id="displacement" in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G" />
      </filter>

      <filter id="glowFilter">
        <feGaussianBlur stdDeviation="6" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
    </defs>
  </svg>

  <!-- ============================================ -->
  <!-- Ambient floating particles                   -->
  <!-- ============================================ -->
  <div id="particles-container" aria-hidden="true"></div>

  <!-- ============================================ -->
  <!-- Main Scene                                   -->
  <!-- ============================================ -->
  <main class="scene">

    <!-- Hero Header -->
    <header class="hero" id="hero">
      <div class="hero__grid-overlay" aria-hidden="true"></div>
      <div class="hero__content">
        <h1 class="hero__title" id="heroTitle">
          <span class="hero__title-line">Code</span><span class="hero__title-line accent">Miners</span>
        </h1>
        <p class="hero__subtitle" id="heroSubtitle">Build. Collaborate. Innovate.</p>
      </div>
      <div class="hero__glow" aria-hidden="true"></div>
    </header>

    <!-- Login Section -->
    <section class="auth-section" id="authSection">

      <!-- Liquid Glass Card -->
      <div class="glass-card" id="glassCard">

        <!-- Card header -->
        <div class="card__header" id="cardHeader">
          <h2 class="card__title" id="cardTitle">Welcome Back</h2>
          <p class="card__subtitle" id="cardSubtitle">Sign in to your account</p>
        </div>

        <!-- Email/Password Form -->
        <form class="auth-form" id="authForm" autocomplete="off">
          <div class="input-group" id="nameGroup" style="display: none;">
            <label class="input-label" for="nameInput">Username</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              <input class="input-field" type="text" id="nameInput" placeholder="" />
            </div>
          </div>

          <div class="input-group">
            <label class="input-label" id="emailLabel" for="emailInput">Username / Email Address</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
              </svg>
              <input class="input-field" type="text" id="emailInput" placeholder="" required />
            </div>
          </div>

          <div class="input-group">
            <label class="input-label" for="passwordInput">Password</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input class="input-field" type="password" id="passwordInput" placeholder="" required minlength="6" />
              <button class="password-toggle" type="button" id="passwordToggle" aria-label="Toggle password visibility">
                <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
            <div class="forgot-password-wrap">
              <button class="forgot-password-btn" type="button" id="forgotBtn">Forgot Password?</button>
            </div>
          </div>

          <!-- Error / Success message -->
          <div class="message-box" id="messageBox" role="alert"></div>

          <button class="btn-primary" type="submit" id="btnSubmit">
            <span class="btn-primary__text" id="btnText">Sign In</span>
            <span class="btn-primary__loader" id="btnLoader"></span>
          </button>
        </form>

        <!-- Divider -->
        <div class="divider" id="divider">
          <span class="divider__line"></span>
          <span class="divider__text">or continue with</span>
          <span class="divider__line"></span>
        </div>

        <!-- OAuth Auth Buttons -->
        <div class="oauth-providers" id="oauthProviders">
          <button class="btn-oauth btn-oauth-g" id="authGoogle" type="button">
            <svg class="btn-oauth__icon" viewBox="0 0 24 24" fill="none">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1Z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23Z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84Z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53Z" fill="#EA4335"/>
            </svg>
            Continue with Google
          </button>

          <button class="btn-oauth btn-oauth-git" id="authGithub" type="button">
            <svg class="btn-oauth__icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
            </svg>
            Continue with GitHub
          </button>
        </div>

        <!-- Toggle Login / Sign-Up -->
        <div class="auth-toggle" id="authToggle">
          <span id="toggleText">Don't have an account?</span>
          <button class="auth-toggle__btn" type="button" id="toggleBtn">Sign Up</button>
        </div>

      </div><!-- /.glass-card -->

    </section>

    <!-- Footer -->
    <footer class="footer">
      <p>&copy; 2026 CodeMiners Hackathon. All rights reserved.</p>
    </footer>

  </main>

  <script src="app.js"></script>
  <script>
    // Disable right-click
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    
    // Disable multiple clicks
    document.addEventListener('dblclick', (e) => e.preventDefault());
  </script>

<script>
    // Disable Ctrl, Shift shortcuts (F12, Ctrl+Shift+I/C/J, Ctrl+U) and Right Click to prevent inspection
  document.addEventListener('keydown', function(e) {
    if (e.key === 'F12' || e.keyCode === 123) {
      e.preventDefault();
      e.stopPropagation();
      return false;
    }
    if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'C' || e.key === 'c' || e.key === 'J' || e.key === 'j' || e.keyCode === 73 || e.keyCode === 67 || e.keyCode === 74)) {
      e.preventDefault();
      e.stopPropagation();
      return false;
    }
    if (e.ctrlKey && (e.key === 'U' || e.key === 'u' || e.keyCode === 85)) {
      e.preventDefault();
      e.stopPropagation();
      return false;
    }
  }, true);
  
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
  }, true);
</script>
</body>
</html>
