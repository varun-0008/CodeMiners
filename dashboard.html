<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeMiners Hackathon — Dashboard</title>
  <meta name="description" content="CodeMiners Hackathon Dashboard — Your hackathon hub." />
  <meta name="theme-color" content="#343A40" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <style>
    /* ── Minimal dashboard styles ── */
    :root {
      --dark-stone:  #343A40;
      --dark-stone-deep: #23272B;
      --tech-amber:  #F39C12;
      --vivid-amber: #E67E22;
      --pure-white:  #FFFFFF;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: sans-serif;
      background: linear-gradient(160deg, var(--dark-stone-deep) 0%, var(--dark-stone) 100%);
      color: var(--pure-white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .dashboard {
      text-align: center;
      padding: 3rem 2rem;
      max-width: 600px;
      opacity: 0;
    }

    .dashboard__badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.25rem 1rem;
      background: rgba(243, 156, 18, 0.1);
      border: 1px solid rgba(243, 156, 18, 0.25);
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: var(--tech-amber);
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    .dashboard__avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--vivid-amber), var(--tech-amber));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      margin: 0 auto 1.5rem;
      box-shadow: 0 0 40px rgba(243, 156, 18, 0.25);
    }

    .dashboard__title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .dashboard__title span {
      color: var(--tech-amber);
    }

    .dashboard__email {
      font-size: 0.875rem;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 2rem;
    }

    .dashboard__info {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      text-align: left;
      backdrop-filter: blur(12px);
    }

    .dashboard__info p {
      font-size: 0.875rem;
      color: rgba(255, 255, 255, 0.65);
      line-height: 1.7;
    }

    .dashboard__info strong {
      color: var(--tech-amber);
    }

    .btn-signout {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 12px 32px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      color: var(--pure-white);
      font-family: sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .btn-signout:hover {
      background: rgba(231, 76, 60, 0.15);
      border-color: rgba(231, 76, 60, 0.35);
      transform: translateY(-2px);
    }

    .loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--dark-stone-deep);
      z-index: 100;
    }

    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(243, 156, 18, 0.2);
      border-top-color: var(--tech-amber);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="loading-screen" id="loadingScreen">
    <div class="loading-spinner"></div>
  </div>

  <div class="dashboard" id="dashboard">
    <div class="dashboard__badge">HACKATHON 2026</div>
    <div class="dashboard__avatar" id="avatar">?</div>
    <h1 class="dashboard__title">Welcome, <span id="userName">Miner</span>!</h1>
    <p class="dashboard__email" id="userEmail">loading...</p>

    <div class="dashboard__info">
      <p>
        You're successfully signed into <strong>CodeMiners Hackathon</strong>.
        This is a placeholder dashboard — your team will build out the full experience here.
      </p>
    </div>

    <button class="btn-signout" id="btnSignOut" type="button">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Sign Out
    </button>
  </div>

  <script src="firebase-config.js"></script>
  <script>
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const loadingScreen = document.getElementById('loadingScreen');
    const dashboard     = document.getElementById('dashboard');
    const avatar        = document.getElementById('avatar');
    const userName      = document.getElementById('userName');
    const userEmail     = document.getElementById('userEmail');
    const btnSignOut    = document.getElementById('btnSignOut');

    // ── Auth state check ──
    auth.onAuthStateChanged((user) => {
      if (user) {
        // Populate dashboard
        const name = user.displayName || user.email.split('@')[0];
        userName.textContent  = name;
        userEmail.textContent = user.email;
        avatar.textContent    = name.charAt(0).toUpperCase();

        // Hide loader, show dashboard
        gsap.to(loadingScreen, {
          opacity: 0,
          duration: 0.3,
          onComplete: () => { loadingScreen.style.display = 'none'; }
        });

        gsap.to(dashboard, {
          opacity: 1,
          y: 0,
          duration: 0.8,
          ease: 'power3.out',
          delay: 0.1,
        });
      } else {
        // Not signed in — redirect to login
        window.location.href = 'index.html';
      }
    });

    // ── Sign Out ──
    btnSignOut.addEventListener('click', async () => {
      gsap.to(dashboard, {
        opacity: 0,
        y: -20,
        duration: 0.3,
        onComplete: async () => {
          await auth.signOut();
          window.location.href = 'index.html';
        },
      });
    });
  </script>
  <script>
    // Disable right-click
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    
    // Disable multiple clicks
    document.addEventListener('dblclick', (e) => e.preventDefault());
  </script>

<script>
    // Disable Ctrl, Shift shortcuts (F12, Ctrl+Shift+I/C/J, Ctrl+U) and Right Click to prevent inspection
  document.addEventListener('keydown', function(e) {
    if (e.key === 'F12' || e.keyCode === 123) {
      e.preventDefault();
      e.stopPropagation();
      return false;
    }
    if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'C' || e.key === 'c' || e.key === 'J' || e.key === 'j' || e.keyCode === 73 || e.keyCode === 67 || e.keyCode === 74)) {
      e.preventDefault();
      e.stopPropagation();
      return false;
    }
    if (e.ctrlKey && (e.key === 'U' || e.key === 'u' || e.keyCode === 85)) {
      e.preventDefault();
      e.stopPropagation();
      return false;
    }
  }, true);
  
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
  }, true);
</script>
</body>
</html>
